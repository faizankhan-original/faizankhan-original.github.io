<style>
  :root{

--bg:#07111f;
--bg2:#0e1829;
--card:rgba(255,255,255,.07);
--border:rgba(255,255,255,.12);

--text:#ffffff;
--muted:#b7bfd0;

--primary:#00d4ff;
--secondary:#7b2ff7;

--radius:22px;

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

html{

scroll-behavior:smooth;

}

body{

font-family:Inter,sans-serif;

background:var(--bg);

color:white;

overflow-x:hidden;

}

body::before{

content:"";

position:fixed;

width:650px;
height:650px;

left:-220px;
top:-250px;

background:#00d4ff22;

filter:blur(120px);

animation:blob1 18s infinite alternate;

pointer-events:none;

}

body::after{

content:"";

position:fixed;

width:650px;
height:650px;

right:-220px;
bottom:-220px;

background:#7b2ff722;

filter:blur(120px);

animation:blob2 22s infinite alternate;

pointer-events:none;

}

@keyframes blob1{

from{

transform:translate(0,0);

}

to{

transform:translate(120px,90px);

}

}

@keyframes blob2{

from{

transform:translate(0,0);

}

to{

transform:translate(-120px,-120px);

}

}

section{

padding:110px 9%;

position:relative;

z-index:10;

}

h1{

font-size:clamp(52px,8vw,82px);

line-height:1.1;

font-weight:800;

}

h2{

font-size:42px;

margin-bottom:35px;

}

p{

color:var(--muted);

line-height:1.8;

}

.gradient{

background:linear-gradient(90deg,var(--primary),var(--secondary));

-webkit-background-clip:text;

color:transparent;

}

nav{

position:fixed;

top:0;

left:0;

width:100%;

padding:20px 9%;

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(8,14,28,.55);

backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,.06);

z-index:9999;

}

.logo{

font-size:28px;

font-weight:800;

letter-spacing:.5px;

}

.logo span{

color:var(--primary);

}

.links{

display:flex;

gap:35px;

}

.links a{

color:white;

text-decoration:none;

transition:.3s;

font-weight:500;

}

.links a:hover{

color:var(--primary);

}

.hero{

min-height:100vh;

display:grid;

grid-template-columns:1.3fr .7fr;

align-items:center;

gap:60px;

}

.subtitle{

margin-top:18px;

font-size:24px;

font-weight:600;

}

.hero p{

margin:28px 0;

max-width:650px;

}

.buttons{

display:flex;

gap:18px;

margin-top:35px;

flex-wrap:wrap;

}

.btn{

padding:16px 34px;

border-radius:999px;

text-decoration:none;

font-weight:700;

transition:.35s;

display:inline-block;

}

.primary{

background:linear-gradient(90deg,var(--primary),var(--secondary));

color:white;

}

.secondary{

border:1px solid rgba(255,255,255,.15);

color:white;

background:rgba(255,255,255,.05);

backdrop-filter:blur(18px);

}

.btn:hover{

transform:translateY(-6px);

box-shadow:0 18px 40px rgba(0,212,255,.25);

}

.glass{

background:var(--card);

border:1px solid var(--border);

backdrop-filter:blur(18px);

border-radius:var(--radius);

}

.hero-card{

padding:40px;

transition:.4s;

}

.hero-card:hover{

transform:translateY(-10px);

box-shadow:0 0 45px rgba(0,212,255,.2);

}

.stats{

display:grid;

gap:20px;

margin-top:25px;

}

.stat{

padding:20px;

border-radius:16px;

background:rgba(255,255,255,.04);

}

.stat h3{

font-size:30px;

margin-bottom:6px;

}
